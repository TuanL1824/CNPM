{% extends 'base.html' %}
{% block content %}
    <div style="max-width: 400px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1);">
        <h2 style="text-align: center; color: #333;">Tạo mật khẩu mới</h2>
        
        <form method="POST" style="display: flex; flex-direction: column; gap: 15px; margin-top: 20px;">
            <input type="text" name="otp" placeholder="Nhập mã OTP (Xem thông báo mô phỏng màu xanh)" required style="padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
            
            <input type="password" name="new_password" placeholder="Mật khẩu mới" required style="padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
            
            <input type="password" name="confirm_password" placeholder="Xác nhận mật khẩu mới" required style="padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
            
            <button type="submit" style="background: #28a745; color: white; padding: 12px; font-weight: bold; border: none; border-radius: 4px; cursor: pointer;">Xác nhận đổi mật khẩu</button>
        </form>
    </div>
{% endblock %}
