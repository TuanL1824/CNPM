{% extends 'base.html' %}
{% block content %}
    <div style="max-width: 400px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1);">
        <h2 style="text-align: center; color: #333;">Khôi phục mật khẩu</h2>
        <p style="text-align: center; font-size: 14px; color: #666;">Vui lòng nhập Email bạn đã dùng để đăng ký tài khoản.</p>
        
        <form method="POST" style="display: flex; flex-direction: column; gap: 15px; margin-top: 20px;">
            <input type="email" name="email" placeholder="Nhập địa chỉ Email" required style="padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
            
            <button type="submit" style="background: #ffc107; color: #333; padding: 12px; font-weight: bold; border: none; border-radius: 4px; cursor: pointer;">Gửi mã OTP</button>
        </form>
        
        <p style="text-align: center; margin-top: 20px;">
            <a href="/login" style="color: #666; text-decoration: none;">Quay lại đăng nhập</a>
        </p>
    </div>
{% endblock %}
