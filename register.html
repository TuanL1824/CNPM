{% extends 'base.html' %}
{% block content %}
    <div style="max-width: 400px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1);">
        <h2 style="text-align: center; color: #333;">Đăng ký tài khoản</h2>
        
        <form method="POST" style="display: flex; flex-direction: column; gap: 15px; margin-top: 20px;">
            <input type="text" name="hoTen" placeholder="Họ và tên" required style="padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
            
            <input type="text" name="soDienThoai" placeholder="Số điện thoại" required style="padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
            
            <input type="email" name="email" placeholder="Email" required style="padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
            
            <input type="text" name="username" placeholder="Tên đăng nhập" required style="padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
            
            <input type="password" name="password" placeholder="Mật khẩu" required style="padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
            
            <input type="password" name="confirm_password" placeholder="Xác nhận mật khẩu" required style="padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
            
            <button type="submit" style="background: #28a745; color: white; padding: 12px; font-size: 16px; border: none; border-radius: 4px; cursor: pointer;">Tạo tài khoản</button>
        </form>
        
        <p style="text-align: center; margin-top: 20px;">
            Đã có tài khoản? <a href="/login" style="color: #007bff; text-decoration: none;">Đăng nhập ngay</a>
        </p>
    </div>
{% endblock %}
